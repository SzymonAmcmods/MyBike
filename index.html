<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBike</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--accent-color);
        }

        header p {
            margin: 5px 0 0 0;
            color: #888;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 50px;
        }

        .route-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .route-card h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #fff;
        }

        .route-card p {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .map-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Proporcje 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .map-source {
            margin-top: 8px;
            font-size: 0.8rem;
            text-align: right;
        }

        .map-source a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .map-source a:hover {
            text-decoration: underline;
        }
    </style>
</head>

    </header>
